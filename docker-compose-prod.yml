services:
  # Service 1: Agent (Backend API)
  agent-backend-prod:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ipr-rag-agent-prod
    ports:
      - "8000:8000"
    environment:
      # IPR HPC Ollama inference endpoint
      - RAG_MAIN_HOST=http://10.20.39.12:11438
      - RAG_MAIN_MODEL=qwen3.6:35b-a3b-q8_0
      - RAG_MAIN_ENGINE=ollama
      - RAG_EMBED_HOST=http://10.20.39.12:11438
      - RAG_EMBED_MODEL=embeddinggemma:300m
      - RAG_EMBED_ENGINE=ollama
      - RAG_NORMALIZATION_HOST=http://10.20.39.12:11438
      - RAG_NORMALIZATION_MODEL=qwen3.6:35b-a3b-q8_0
      - RAG_NORMALIZATION_ENGINE=ollama
      - RAG_VLM_HOST=http://10.20.39.12:11438
      - RAG_VLM_MODEL=qwen3.6:35b-a3b-q8_0
      - RAG_VLM_ENGINE=ollama
      - RAG_WORKFLOW=fused
      - RAG_RETRIEVAL_TOP_K=5
      - RAG_RETRIEVAL_MIN_SCORE=0.02
      - MODEL_CONTEXT_WINDOW=16384
      - RAG_CANDIDATE_MULTIPLIER=7
      - RAG_NO_THINKING=true

      # SAML Service Provider Config (This App)
      - SAML_SP_ENTITY_ID=https://askme.ipr.res.in/metadata
      - SAML_SP_ACS_URL=https://askme.ipr.res.in/saml/acs
      - SAML_SP_SLO_URL=https://askme.ipr.res.in/saml/slo
      - SAML_SP_CERT_FILE=/app/askme.crt
      - SAML_SP_KEY_FILE=/app/askme.key

      # SAML Identity Provider Config (ADFS)
      - SAML_IDP_ENTITY_ID=https://adfs.ipr.res.in/adfs/services/trust
      - SAML_IDP_SSO_URL=https://adfs.ipr.res.in/adfs/ls
      - SAML_IDP_SLO_URL=https://adfs.ipr.res.in/adfs/ls/?wa=wsignout1.0
      - SAML_IDP_CERT_FILE=/app/idp.crt
      - XMLSEC_BINARY=/usr/bin/xmlsec1

      # Session Security (Direct Sync with backend/saml/settings.py)
      - SAML_SESSION_SECRET=e9a4c5f8b2d1e3f7a0c9b8e6d5f4c3b2a1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6
      - SAML_SESSION_MAX_AGE=28800
      - SESSION_COOKIE_NAME=saml_session
      - SAML_COOKIE_SECURE=true

      - USE_SAML_LOGIN=true
      - ANONYMIZED_TELEMETRY=False
      - INGEST_FORCE_CPU=True

    volumes:
      # Persist uploaded documents and the vector database
      - ./upload_docs:/app/upload_docs
      - ./chroma_db:/app/chroma_db
      - ./admin_data:/app/admin_data
      # Persist user chat sessions/messages and graph/checkpoint state
      - ./rag_chat_sessions.db:/app/rag_chat_sessions.db
      - ./agent_state.db:/app/agent_state.db
      # Mount SAML certificates/keys instead of baking them into the image
      - ./idp.crt:/app/idp.crt:ro
      - ./askme.crt:/app/askme.crt:ro
      - ./askme.key:/app/askme.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Service 2: GUI (Frontend)
  gui-frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USE_SAML_LOGIN: "true"
        NEXT_PUBLIC_BACKEND_URL: "https://askme.ipr.res.in"
    container_name: ipr-rag-gui-prod
    ports:
      - "3000:3000"
    environment:
      # Next.js telemetry disable (optional)
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_USE_SAML_LOGIN=true
      - NEXT_PUBLIC_BACKEND_URL=https://askme.ipr.res.in
      - USE_SAML_LOGIN=true
    depends_on:
      - agent-backend-prod
    restart: unless-stopped

  # Service 3: Admin Dashboard
  admin-dashboard-prod:
    build:
      context: ./Admin_Dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_BASE_PATH: "/admin"
        NEXT_PUBLIC_ADMIN_API_BASE: "/admin/api/admin-backend"
    container_name: ipr-rag-admin-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3001
      - HOSTNAME=0.0.0.0
      # Server-side Next.js proxy target for /api/admin-backend/*.
      - ADMIN_BACKEND_UPSTREAM=http://agent-backend-prod:8000
      # Keep browser calls same-origin through the dashboard proxy.
      - NEXT_PUBLIC_ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_API_BASE=/admin/api/admin-backend
    depends_on:
      - agent-backend-prod
    restart: unless-stopped
