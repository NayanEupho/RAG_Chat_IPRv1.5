events {}

http {
    tcp_nodelay on;

    upstream web_ui {
        server askme.ipr.res.in:3000;
    }

    upstream backend {
        server askme.ipr.res.in:8000;
    }

    upstream admin_dashboard {
        server askme.ipr.res.in:3001;
    }

    # Allow admin uploads / document ingestion.
    client_max_body_size 2g;

    # --- HTTP to HTTPS redirect ---
    server {
        listen 80;
        server_name askme.ipr.res.in;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl;
        server_name askme.ipr.res.in;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- CORS HEADERS ---
        add_header Access-Control-Allow-Origin https://askme.ipr.res.in always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;

        # --- SAML routes must go to backend ---
        location /saml/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Chat streaming / SSE ---
        location = /api/chat/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header Cache-Control "no-cache";
            add_header X-Accel-Buffering no always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            send_timeout 3600s;
            gzip off;
        }

        # --- Backend API routes ---
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Admin dashboard canonical slash ---
        location = /admin {
            return 302 /admin/;
        }

        # --- Admin dashboard SSE events ---
        location /admin/api/admin-backend/events {
            proxy_pass http://admin_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header Cache-Control "no-cache";
            add_header X-Accel-Buffering no always;
            add_header Cache-Control "no-cache, no-transform" always;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            send_timeout 3600s;
            gzip off;
        }

        # --- Admin dashboard UI and assets ---
        location /admin/ {
            proxy_pass http://admin_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Chat frontend UI ---
        location / {
            proxy_pass http://web_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
